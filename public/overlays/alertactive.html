<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Weather Warning Counters</title>
 <style>
 html, body {
 height: 100%;
 }
 
 body {
 margin: 0;
 font-family: Arial, sans-serif;
 background: #ffffff;
 }
 
 .counter-container {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 0;
 margin-top: 20px;
 padding: 0;
 }

 .counter {
 width: 320px;
 padding: 10px;
 text-align: center;
 color: white;
 font-family: Arial, sans-serif;
 font-size: 24px;
 font-weight: bold;
 border-radius: 0;
 margin-bottom: 0;
 box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
 transform: translateZ(0);
 }
 
 .tornado-counter {
 background-color: red;
 }
 
 .severe-counter {
 background-color: yellow;
 color: black;
 }
 
 .changed {
 animation: pop 280ms ease-out;
 }
 
 @keyframes pop {
 0% { transform: scale(1); }
 45% { transform: scale(1.08); }
 100% { transform: scale(1); }
 }
 </style>
</head>
<body>
 <div class="counter-container">
 <div class="counter tornado-counter" id="tornadoCounter">Tornado: 0</div>
 <div class="counter severe-counter" id="severeCounter">Severe: 0</div>
 </div>

 <script>
 const LOCAL_OVERLAYS_WS_URL = `${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}/stream`;
 const STATUS_API_URL = `${window.location.origin}/api/status`;
 
 let lastTornadoCount = 0;
 let lastSevereCount = 0;
 let socket = null;
 let reconnectTimer = null;
 let refreshTimer = null;
 
 function animateIfChanged(el, changed) {
 if (!changed) return;
 el.classList.remove("changed");
 void el.offsetWidth;
 el.classList.add("changed");
 }
 
 function updateCounters(tornadoCount, severeCount) {
 const tornadoEl = document.getElementById("tornadoCounter");
 const severeEl = document.getElementById("severeCounter");
 
 tornadoEl.textContent = `Tornado: ${tornadoCount}`;
 severeEl.textContent = `Severe: ${severeCount}`;
 
 animateIfChanged(tornadoEl, tornadoCount !== lastTornadoCount);
 animateIfChanged(severeEl, severeCount !== lastSevereCount);
 
 lastTornadoCount = tornadoCount;
 lastSevereCount = severeCount;
 }

 function normalize(value) {
 return String(value || "").toUpperCase().replace(/\s+/g, " ").trim();
 }

 function isActiveAlert(feature, now = Date.now()) {
 const properties = feature && feature.properties ? feature.properties : {};
 const action = normalize(properties.action_type || properties.messageType);
 if (action === "EXPIRED" || action === "CANCELLED" || action === "CANCELED") {
 return false;
 }

 const expiresAt = Date.parse(String(properties.expires || properties.ends || properties.end || ""));
 if (Number.isFinite(expiresAt) && expiresAt <= now) {
 return false;
 }

 return true;
 }

 function dedupeByTracking(features) {
 const map = new Map();

 for (const feature of features) {
 const properties = feature && feature.properties ? feature.properties : {};
 const details = properties && properties.details ? properties.details : {};
 const tracking = String(details.tracking || properties.id || feature.id || properties.hash || "").trim();
 if (!tracking) {
 continue;
 }

 const issuedAt = Date.parse(String(properties.issued || details.issued || properties.sent || "")) || 0;
 const existing = map.get(tracking);
 if (!existing) {
 map.set(tracking, { feature, issuedAt });
 continue;
 }

 if (issuedAt >= existing.issuedAt) {
 map.set(tracking, { feature, issuedAt });
 }
 }

 return Array.from(map.values()).map((entry) => entry.feature);
 }

 function computeCounts(features) {
 const now = Date.now();
 const deduped = dedupeByTracking((Array.isArray(features) ? features : []).filter((feature) => isActiveAlert(feature, now)));
 let tornadoCount = 0;
 let severeCount = 0;

 for (const feature of deduped) {
 const properties = feature && feature.properties ? feature.properties : {};
 const details = properties && properties.details ? properties.details : {};
 const event = normalize(properties.event || details.native);
 const name = normalize(details.name || properties.properEventName || properties.event);

 if (event === "TORNADO WARNING" || name.includes("TORNADO WARNING")) {
 tornadoCount += 1;
 continue;
 }

 if (event === "SEVERE THUNDERSTORM WARNING" || name.includes("SEVERE THUNDERSTORM WARNING")) {
 severeCount += 1;
 }
 }

 return { tornadoCount, severeCount };
 }

 async function refreshCounts() {
 try {
 const response = await fetch(STATUS_API_URL, { cache: "no-store" });
 if (!response.ok) {
 return;
 }
 const payload = await response.json();
 updateCounters(
 (payload && payload.summary && payload.summary.tornadoWarningCount) || 0,
 (payload && payload.summary && payload.summary.severeWarningCount) || 0
 );
 } catch (error) {
 }
 }
 
 function connectLocalOverlays() {
 if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
 return;
 }
 
 socket = new WebSocket(LOCAL_OVERLAYS_WS_URL);
 
 socket.addEventListener("open", () => {
 refreshCounts();
 });
 socket.addEventListener("message", (event) => {
 handleSocketMessage(event.data);
 });
 socket.addEventListener("close", () => {
 socket = null;
 scheduleReconnect();
 });
 socket.addEventListener("error", () => {
 if (socket) {
 socket.close();
 }
 });
 }
 
 function scheduleReconnect() {
 if (reconnectTimer) return;
 reconnectTimer = window.setTimeout(() => {
 reconnectTimer = null;
 connectLocalOverlays();
 }, 1000);
 }
 
 function handleSocketMessage(raw) {
 let data;
 
 try {
 data = JSON.parse(raw);
 } catch (error) {
 return;
 }

 if (data.type === "update" || data.type === "status" || data.type === "subscribe") {
 const summary = data && data.message && data.message.summary
 ? data.message.summary
 : (data && data.message && data.value === "summary" ? data.message : null);
 if (summary) {
 updateCounters(summary.tornadoWarningCount || 0, summary.severeWarningCount || 0);
 return;
 }
 refreshCounts();
 }
 }
 
 connectLocalOverlays();
 refreshCounts();
 refreshTimer = window.setInterval(refreshCounts, 30000);
 </script>
</body>
</html>
