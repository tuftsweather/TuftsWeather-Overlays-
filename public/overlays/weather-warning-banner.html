<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NWS Highest Warning Banner</title>
  <style>
    :root {
      --banner-width: 1920px;
      --banner-height: 1080px;
      --clock-reserved-width: 380px;
      --alert-clock-width: 250px;
      --no-warning-clock-width: 310px;
      --alert-clock-center-y: 65px;
      --no-warning-band-height: 130px;
      --no-warning-blue: #006fd6;
      --banner-main: #d10000;
      --banner-title: #a90000;
      --banner-border: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: var(--banner-width);
      min-height: var(--banner-height);
      overflow: hidden;
      background: transparent;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #topBandFill {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 2;
      display: none;
      width: 18px;
      height: 130px;
      background: transparent;
      pointer-events: none;
    }

    #modernBanner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 3;
      width: var(--banner-width);
      height: 130px;
      background: var(--banner-main);
      border-top: 6px solid var(--banner-border);
      border-bottom: 4px solid var(--banner-border);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .modern-title {
      position: absolute;
      left: 0;
      top: -6px;
      width: 700px;
      height: 142px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      background: var(--banner-title);
      color: #ffffff;
      font-size: 45px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow:
        -1px -1px 0 rgba(0, 0, 0, 0.75),
        1px -1px 0 rgba(0, 0, 0, 0.75),
        -1px 1px 0 rgba(0, 0, 0, 0.75),
        1px 1px 0 rgba(0, 0, 0, 0.75),
        0 3px 0 rgba(0, 0, 0, 0.42);
    }

    .radar-legend {
      position: absolute;
      left: 730px;
      top: 27px;
      display: flex;
      align-items: flex-start;
      gap: 62px;
      height: 66px;
      padding-top: 2px;
    }

    .legend-item {
      display: grid;
      gap: 8px;
      min-width: 204px;
    }

    .legend-label {
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55);
    }

    .legend-bar {
      width: 202px;
      height: 26px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .legend-bar.reflectivity {
      background: linear-gradient(90deg, #1b4dff 0%, #00e8ff 18%, #00e600 36%, #fff300 54%, #ff7b00 70%, #ff0000 84%, #f000ff 100%);
    }

    .legend-bar.velocities {
      background: linear-gradient(90deg, #19d319 0%, #9bff9b 28%, #e8e8e8 48%, #ff7a7a 70%, #cc0000 100%);
    }

    .legend-item:nth-child(2) {
      margin-left: 30px;
    }

    .time-separator {
      position: absolute;
      top: 0;
      right: 588px;
      width: 7px;
      height: 130px;
      background: #ffffff;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }

    #bannerOutline {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 4;
      display: none;
      width: var(--banner-width);
      height: 130px;
      border: 5px solid transparent;
      pointer-events: none;
    }

    #bannerViewport {
      display: none !important;
      position: relative;
      z-index: 1;
      width: var(--banner-width);
      height: 180px;
      overflow: hidden;
    }

    #bannerImage {
      width: var(--banner-width);
      height: auto;
      display: block;
      vertical-align: top;
    }

    #noWarnings {
      display: none;
      width: var(--banner-width);
      height: 135px;
      background: transparent;
      overflow: hidden;
    }

    .no-warning-strip {
      width: var(--banner-width);
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 var(--clock-reserved-width) 0 28px;
      background: var(--no-warning-blue);
      color: #ffffff;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      overflow: hidden;
    }

    .no-warning-text {
      display: block;
      width: auto;
      max-width: 100%;
      font-size: clamp(30px, 5.1vw, 54px);
      line-height: 1.05;
      text-align: left;
      white-space: nowrap;
      transform-origin: left center;
    }

    #status {
      display: none;
      position: fixed;
      right: 10px;
      bottom: 8px;
      max-width: min(520px, calc(100vw - 20px));
      padding: 7px 9px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.88);
      color: #15202b;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.12);
      pointer-events: none;
    }

    #status.visible {
      display: block;
    }

    #time {
      position: fixed;
      top: var(--alert-clock-center-y);
      right: 58px;
      transform: translateY(-50%);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 455px;
      font-family: Arial, sans-serif;
      font-size: 47px;
      font-weight: 950;
      color: #ffffff;
      background: transparent;
      padding: 0;
      border-radius: 0;
      text-align: center;
      line-height: 1;
      white-space: nowrap;
      text-shadow:
        -1px -1px 0 rgba(0, 0, 0, 0.78),
        1px -1px 0 rgba(0, 0, 0, 0.78),
        -1px 1px 0 rgba(0, 0, 0, 0.78),
        1px 1px 0 rgba(0, 0, 0, 0.78),
        0 3px 0 rgba(0, 0, 0, 0.44);
    }

    body.no-warning-active #time {
      top: calc(var(--no-warning-band-height) / 2);
      right: calc((var(--clock-reserved-width) - var(--no-warning-clock-width)) / 2);
      width: var(--no-warning-clock-width);
      font-size: 38px;
      padding: 12px;
    }

  </style>
</head>
<body>
  <div id="topBandFill"></div>
  <section id="modernBanner" aria-label="Highest active warning banner">
    <div class="modern-title" id="modernTitle">No Severe Warnings</div>
    <div class="radar-legend" aria-hidden="true">
      <div class="legend-item">
        <div class="legend-label">Reflectivity</div>
        <div class="legend-bar reflectivity"></div>
      </div>
      <div class="legend-item">
        <div class="legend-label">Velocities</div>
        <div class="legend-bar velocities"></div>
      </div>
    </div>
    <div class="time-separator"></div>
  </section>
  <div id="bannerViewport">
    <img id="bannerImage" alt="">
  </div>
  <section id="noWarnings" aria-label="No severe warnings active currently">
    <div class="no-warning-strip">
      <div class="no-warning-text">No severe warnings active currently</div>
    </div>
  </section>
  <div id="bannerOutline"></div>
  <div id="time"></div>
  <div id="status">Checking NWS alerts...</div>

AWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkAXJDwAAQBYkPwAAAFmQ/AAAAGRB8gMAAJAFyQ8AAEAWJD8AAABZkPwAAABkQfIDAACQBckPAABAFiQ/AAAAWZD8AAAAZEHyAwAAkMX/A4zx2RT7KTvIAAAAAElFTkSuQmCC",
        fill: "#ff1493"
      }
    ];

    const bannerByKey = Object.fromEntries(BANNERS.map((banner) => [banner.key, banner]));
    const bannerKeyFallbacks = {
      "eds-severe-thunderstorm": "severe-thunderstorm",
      "destructive-severe-thunderstorm": "severe-thunderstorm",
      "considerable-severe-thunderstorm": "severe-thunderstorm",
      "severe-thunderstorm-watch": "severe-thunderstorm",
      "flash-flood-warning": "severe-thunderstorm",
      "considerable-flash-flood-warning": "severe-thunderstorm",
      "flash-flood-emergency": "severe-thunderstorm",
    };
    const params = new URLSearchParams(window.location.search);

    const bannerViewport = document.getElementById("bannerViewport");
    const bannerImage = document.getElementById("bannerImage");
    const modernBanner = document.getElementById("modernBanner");
    const modernTitle = document.getElementById("modernTitle");
    const noWarnings = document.getElementById("noWarnings");
    const noWarningText = document.querySelector(".no-warning-text");
    const topBandFill = document.getElementById("topBandFill");
    const bannerOutline = document.getElementById("bannerOutline");
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const debugStatus = params.get("debug") === "1";
    let lastRenderedKey = "";
    let socket = null;
    let currentSummary = {
      activeCount: 0,
      highestKey: "",
      highestLabel: "No severe alerts active currently",
      highestFill: "#006fd6"
    };
    let reconnectTimer = null;

    if (debugStatus) {
      statusEl.classList.add("visible");
    }

    function connectLocalOverlays() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        return;
      }

      statusEl.textContent = "Connecting to TuftsWeather Overlays alerts...";
      socket = new WebSocket(LOCAL_OVERLAYS_WS_URL);

      socket.addEventListener("open", () => {
        socket.send(JSON.stringify({
          type: "subscribe",
          message: LOCAL_OVERLAYS_SUBSCRIPTIONS
        }));
      });

      socket.addEventListener("message", (event) => {
        handleSocketMessage(event.data);
      });

      socket.addEventListener("close", () => {
        socket = null;
        renderSummary(currentSummary, "TuftsWeather Overlays websocket disconnected");
        scheduleReconnect();
      });

      socket.addEventListener("error", () => {
        renderSummary(currentSummary, "TuftsWeather Overlays websocket unavailable");
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) {
        return;
      }

      reconnectTimer = window.setTimeout(() => {
        reconnectTimer = null;
        connectLocalOverlays();
      }, 1000);
    }

    function handleSocketMessage(raw) {
      let data;

      try {
        data = JSON.parse(raw);
      } catch (error) {
        return;
      }

      if (data.type === "subscribe" && data.value === "summary" && data.message) {
        currentSummary = data.message || currentSummary;
        renderSummary(currentSummary);
        return;
      }

      if (data.type === "update" && data.message && typeof data.message === "object" && data.message.summary) {
        currentSummary = data.message.summary;
        renderSummary(currentSummary);
      }
    }
    function renderSummary(summary, errorMessage = "") {
      const now = new Date();
      const scope = "TuftsWeather Overlays active alerts";
      const highestKey = summary?.highestKey || "";
      const fallbackKey = bannerKeyFallbacks[highestKey] || "";
      const highestBanner = highestKey
        ? bannerByKey[highestKey] || bannerByKey[fallbackKey] || null
        : null;

      if (!highestBanner) {
        modernBanner.style.display = "none";
        bannerViewport.style.display = "none";
        topBandFill.style.display = "none";
        noWarnings.style.display = "block";
        bannerOutline.style.borderColor = "#006fd6";
        bannerOutline.style.display = "block";
        document.body.classList.add("no-warning-active");
        fitNoWarningText();
        lastRenderedKey = "none";
        statusEl.textContent = errorMessage
          ? `${errorMessage}. Showing no-warning banner. Last checked ${now.toLocaleTimeString()}.`
          : `No severe alerts active currently in ${scope}. Last checked ${now.toLocaleTimeString()}.`;
        return;
      }

      if (lastRenderedKey !== highestBanner.key) {
        bannerImage.src = highestBanner.image;
        bannerImage.alt = highestBanner.label;
        lastRenderedKey = highestBanner.key;
      }

      const baseColor = resolveBannerColor(summary, highestBanner);
      const titleColor = darkenColor(baseColor, 0.22);
      document.documentElement.style.setProperty("--banner-main", baseColor);
      document.documentElement.style.setProperty("--banner-title", titleColor);
      topBandFill.style.background = baseColor;
      bannerOutline.style.borderColor = baseColor;
      modernTitle.textContent = formatBannerLabel(summary, highestBanner);

      noWarnings.style.display = "none";
      modernBanner.style.visibility = "hidden";
      modernBanner.style.display = "block";
      topBandFill.style.display = "block";
      bannerOutline.style.display = "block";
      bannerViewport.style.display = "none";
      document.body.classList.remove("no-warning-active");
      fitModernTitle();
      statusEl.textContent = `${modernTitle.textContent} is highest of ${summary?.activeCount || 0} active TuftsWeather Overlays alert(s). Last checked ${now.toLocaleTimeString()}.`;
    }

    function formatBannerLabel(summary, fallbackBanner) {
      const label = String(summary?.highestLabel || fallbackBanner?.label || "Warning")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();

      if (label === "RADAR INDICATED TORNADO WARNING") {
        return "TORNADO WARNING";
      }

      return label;
    }

    function resolveBannerColor(summary, fallbackBanner) {
      const key = String(summary?.highestKey || fallbackBanner?.key || "");
      const color = summary?.highestColor || summary?.highestFill || fallbackBanner?.fill || "#d10000";

      if (key.includes("tornado-emergency")) return "#ff1493";
      if (key.includes("pds-tornado")) return "#7c3aed";
      if (key.includes("tornado-observed")) return "#a40000";
      if (key.includes("radar-indicated-tornado")) return "#e30000";
      if (key.includes("eds-severe-thunderstorm")) return "#8a5400";
      if (key.includes("destructive-severe-thunderstorm")) return "#966000";
      if (key.includes("considerable-severe-thunderstorm")) return "#b38300";
      if (key.includes("severe-thunderstorm-watch")) return "#e47b8f";
      if (key.includes("severe-thunderstorm")) return "#d4ad00";
      if (key.includes("flash-flood-emergency")) return "#0b3d1b";
      if (key.includes("considerable-flash-flood")) return "#13662f";
      if (key.includes("flash-flood")) return "#1f8a43";
      return color;
    }

    function darkenColor(color, amount) {
      const value = String(color || "").replace("#", "");
      if (!/^[0-9a-fA-F]{6}$/.test(value)) {
        return color;
      }

      const factor = Math.max(0, 1 - amount);
      const parts = [0, 2, 4].map((offset) => {
        const channel = Number.parseInt(value.slice(offset, offset + 2), 16);
        const next = Math.max(0, Math.min(255, Math.round(channel * factor)));
        return next.toString(16).padStart(2, "0");
      });

      return `#${parts.join("")}`;
    }

    function fitModernTitle() {
      if (!modernTitle) {
        return;
      }

      modernTitle.style.fontSize = "45px";
      window.requestAnimationFrame(() => {
        let fontSize = Number.parseFloat(window.getComputedStyle(modernTitle).fontSize);
        while (
          (modernTitle.scrollWidth > modernTitle.clientWidth || modernTitle.scrollHeight > modernTitle.clientHeight) &&
          fontSize > 22
        ) {
          fontSize -= 1;
          modernTitle.style.fontSize = `${fontSize}px`;
        }
        modernBanner.style.visibility = "visible";
      });
    }

    function fitNoWarningText() {
      const strip = document.querySelector(".no-warning-strip");
      if (!strip || !noWarningText) {
        return;
      }

      noWarningText.style.transform = "scale(1)";
      const reservedClockWidth = Number(getComputedStyle(document.documentElement)
        .getPropertyValue("--clock-reserved-width")
        .replace("px", "")) || 300;
      const availableWidth = strip.clientWidth - reservedClockWidth - 56;
      const textWidth = noWarningText.scrollWidth;
      const scale = textWidth > availableWidth ? Math.max(0.55, availableWidth / textWidth) : 1;
      noWarningText.style.transform = `scale(${scale})`;
    }

    const timeZones = [
      { label: "ET", timeZone: "America/New_York" },
      { label: "CT", timeZone: "America/Chicago" },
      { label: "MT", timeZone: "America/Denver" },
      { label: "PT", timeZone: "America/Los_Angeles" }
    ];

    let timeZoneIndex = 0;

    function formatTime(now, timeZone) {
      return now.toLocaleTimeString("en-US", {
        timeZone,
        hour12: true,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function updateTime() {
      const now = new Date();
      const current = timeZones[timeZoneIndex];
      timeEl.textContent = `${formatTime(now, current.timeZone)} ${current.label}`;
    }

    connectLocalOverlays();
    updateTime();
    window.addEventListener("resize", () => {
      fitNoWarningText();
      fitModernTitle();
    });
    window.setInterval(updateTime, 1000);
    window.setInterval(() => {
      timeZoneIndex = (timeZoneIndex + 1) % timeZones.length;
      updateTime();
    }, 10000);
  </script>
