<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TuftsWeather Overlays Winter Cameras</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
  <style>
    :root {
      --overlay-top: 22px;
      --overlay-width: min(84vw, 1120px);
      --overlay-primary: #c80f11;
      --overlay-secondary: #8f0b0d;
      --overlay-radius: 14px;
      --overlay-border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .root {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #video,
    #embedFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: 0;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .top-pill {
      position: absolute;
      top: var(--overlay-top);
      left: 50%;
      transform: translateX(-50%);
      width: var(--overlay-width);
      max-width: calc(100vw - 32px);
      min-height: 62px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--overlay-radius);
      border: 2px solid var(--overlay-border);
      background: linear-gradient(135deg, var(--overlay-primary), var(--overlay-secondary));
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.42);
      z-index: 5;
      text-align: center;
    }

    .top-pill.hidden,
    .status.hidden {
      display: none !important;
    }

    .top-pill__content {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      width: 100%;
    }

    .top-pill__warning {
      font-size: clamp(18px, 2.4vw, 38px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
    }

    .top-pill__divider {
      font-size: clamp(16px, 1.6vw, 28px);
      font-weight: 700;
      opacity: 0.82;
    }

    .top-pill__location {
      font-size: clamp(17px, 2.1vw, 34px);
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
    }

    .status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 4;
      pointer-events: none;
    }

    .status__box {
      max-width: min(72vw, 920px);
      padding: 14px 20px;
      border-radius: var(--overlay-radius);
      background: rgba(14, 14, 18, 0.84);
      border: 2px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 18px 56px rgba(0, 0, 0, 0.44);
      font-size: clamp(18px, 2.4vw, 34px);
      font-weight: 800;
      text-align: center;
    }

    .watermark {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      max-width: calc(100vw - 16px);
      color: rgba(255, 255, 255, 0.4);
      font-size: clamp(10px, 0.95vw, 18px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="root">
    <video id="video" autoplay playsinline muted></video>
    <iframe id="embedFrame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    <div class="top-pill hidden" id="topPill">
      <div class="top-pill__content">
        <span class="top-pill__warning" id="warningText">Winter Storm Warning</span>
        <span class="top-pill__divider">|</span>
        <span class="top-pill__location" id="locationText">Dexter, MO</span>
      </div>
    </div>
    <div class="status" id="status">
      <div class="status__box" id="statusText">Checking for cameras inside active winter warnings...</div>
    </div>
    <div class="watermark">NOT FOR BROADCAST - REQUIRES PERMISSION FROM OWNER</div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const elements = {
        video: document.getElementById("video"),
        embedFrame: document.getElementById("embedFrame"),
        topPill: document.getElementById("topPill"),
        warningText: document.getElementById("warningText"),
        locationText: document.getElementById("locationText"),
        status: document.getElementById("status"),
        statusText: document.getElementById("statusText"),
      };

      const settings = {
        refreshTime: Math.max(5, Number(params.get("setRefreshTime") || "15")),
        rotationTime: Math.max(20, Number(params.get("setRotationTime") || "20")),
        matchesUrl: params.get("setMatchesUrl") || "/api/warned-cameras?widget=winter",
        cameraDataUrl: params.get("setCameraDataUrl") || "/api/cameras-lite?widget=winter",
        fallbackCameraDataUrl: params.get("setFallbackCameraDataUrl") || "/api/cameras?v=21",
        search: params.get("setSearch") || "",
        streamSource: (params.get("setStreamSource") || "*").toLowerCase(),
        warningPattern: new RegExp(params.get("setWarningPattern") || "WINTER STORM WARNING|WINTER STORM WATCH|BLIZZARD WARNING|BLIZZARD WATCH|WINTER WEATHER ADVISORY", "i"),
        streamMuted: (params.get("setStreamMuted") || "true") !== "false",
        streamBufferDelay: Math.max(1, Number(params.get("setStreamBufferDelay") || "2")),
        fallbackRadiusMiles: Math.max(5, Number(params.get("setFallbackRadiusMiles") || "18")),
        cameraFetchTimeoutMs: Math.max(1500, Number(params.get("setCameraFetchTimeoutMs") || "4500")),
      };

      const rankOrder = [
        "BLIZZARD WARNING",
        "BLIZZARD WATCH",
        "WINTER STORM WARNING",
        "WINTER STORM WATCH",
        "WINTER WEATHER ADVISORY",
      ];

      const state = {
        cameras: [],
        matches: [],
        currentIndex: -1,
        currentChaserIndex: -1,
        rotationStep: 0,
        chasers: [],
        currentStreamUrl: "",
        currentEventsSignature: "",
        failedStreamUrls: new Set(),
        rotationTimer: null,
        refreshTimer: null,
        connectTimeout: null,
        hls: null,
      };

      function normalize(value) {
        return String(value || "").toUpperCase().replace(/\s+/g, " ").trim();
      }

      function classifyAlert(feature) {
        const properties = feature?.properties ?? {};
        const details = properties?.details ?? {};
        const event = normalize(properties.event || details.native);
        const name = normalize(details.name || properties.properEventName || properties.event);
        const headline = normalize(properties.headline);
        const combinedText = `${name} ${event} ${headline}`;

        if (name.includes("BLIZZARD WARNING") || event === "BLIZZARD WARNING" || combinedText.includes("BLIZZARD WARNING")) {
          return { label: "BLIZZARD WARNING", primary: "#2f7dff", secondary: "#1f59be" };
        }
        if (name.includes("BLIZZARD WATCH") || event === "BLIZZARD WATCH" || combinedText.includes("BLIZZARD WATCH")) {
          return { label: "BLIZZARD WATCH", primary: "#6d8dff", secondary: "#5169bf" };
        }
        if (name.includes("WINTER STORM WARNING") || event === "WINTER STORM WARNING" || combinedText.includes("WINTER STORM WARNING")) {
          return { label: "WINTER STORM WARNING", primary: "#d14cff", secondary: "#9e34c4" };
        }
        if (name.includes("WINTER STORM WATCH") || event === "WINTER STORM WATCH" || combinedText.includes("WINTER STORM WATCH")) {
          return { label: "WINTER STORM WATCH", primary: "#8a68ff", secondary: "#6749c4" };
        }
        if (name.includes("WINTER WEATHER ADVISORY") || event === "WINTER WEATHER ADVISORY" || combinedText.includes("WINTER WEATHER ADVISORY")) {
          return { label: "WINTER WEATHER ADVISORY", primary: "#7b89a8", secondary: "#55627e" };
        }

        return { label: properties.event || "ACTIVE WINTER WARNING", primary: "#2f7dff", secondary: "#1f59be" };
      }

      function rankEvent(label) {
        const normalized = normalize(label);
        const index = rankOrder.findIndex((entry) => normalized.includes(entry));
        return index === -1 ? rankOrder.length + 1 : index;
      }

      function eventIsActiveWarning(feature) {
        const properties = feature?.properties ?? {};
        const event = String(properties.event || "").trim();
        const action = normalize(properties.action_type || properties.messageType);
        const expiresAt = Date.parse(String(properties.expires || ""));
        if (!event || action === "EXPIRED" || action === "CANCELLED" || action === "CANCELED") {
          return false;
        }
        if (!settings.warningPattern.test(event)) {
          return false;
        }
        if (Number.isFinite(expiresAt) && expiresAt <= Date.now()) {
          return false;
        }
        return true;
      }

      function decodePolygons(encoded) {
        if (!encoded) return [];
        try {
          return JSON.parse(atob(String(encoded)));
        } catch {
          return [];
        }
      }

      function normalizePolygonSet(input) {
        if (!Array.isArray(input) || !input.length) {
          return [];
        }

        if (
          Array.isArray(input[0])
          && Array.isArray(input[0][0])
          && typeof input[0][0][0] === "number"
        ) {
          return [input[0]];
        }

        if (
          Array.isArray(input[0])
          && Array.isArray(input[0][0])
          && Array.isArray(input[0][0][0])
        ) {
          return input
            .map((polygon) => {
              if (!Array.isArray(polygon)) return null;
              if (Array.isArray(polygon[0]) && Array.isArray(polygon[0][0])) {
                return polygon[0];
              }
              return polygon;
            })
            .filter((polygon) => Array.isArray(polygon) && polygon.length >= 3);
        }

        return [];
      }

      function getEventPolygonSet(feature) {
        const geometry = feature?.geometry ?? {};
        if (geometry.type === "Polygon") {
          return normalizePolygonSet(geometry.coordinates);
        }
        if (geometry.type === "MultiPolygon") {
          return normalizePolygonSet(geometry.coordinates);
        }

        const rawGeometry = feature?.properties?.raw?.geometry ?? {};
        if (rawGeometry.type === "Polygon") {
          return normalizePolygonSet(rawGeometry.coordinates);
        }
        if (rawGeometry.type === "MultiPolygon") {
          return normalizePolygonSet(rawGeometry.coordinates);
        }

        return normalizePolygonSet(decodePolygons(feature?.properties?.geocode?.generated));
      }

      function getPolygonBounds(polygonSet) {
        let minLon = Infinity;
        let minLat = Infinity;
        let maxLon = -Infinity;
        let maxLat = -Infinity;

        for (const ring of polygonSet) {
          for (const point of ring) {
            const lon = Number(point?.[0]);
            const lat = Number(point?.[1]);
            if (!Number.isFinite(lon) || !Number.isFinite(lat)) continue;
            minLon = Math.min(minLon, lon);
            minLat = Math.min(minLat, lat);
            maxLon = Math.max(maxLon, lon);
            maxLat = Math.max(maxLat, lat);
          }
        }

        if (![minLon, minLat, maxLon, maxLat].every(Number.isFinite)) {
          return null;
        }

        return { minLon, minLat, maxLon, maxLat };
      }

      function haversineMiles(lat1, lon1, lat2, lon2) {
        const toRadians = (value) => (value * Math.PI) / 180;
        const earthRadiusMiles = 3958.8;
        const dLat = toRadians(lat2 - lat1);
        const dLon = toRadians(lon2 - lon1);
        const a = Math.sin(dLat / 2) ** 2
          + Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLon / 2) ** 2;
        return 2 * earthRadiusMiles * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function pointInRing(lon, lat, ring) {
        let inside = false;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const xi = Number(ring[i][0]);
          const yi = Number(ring[i][1]);
          const xj = Number(ring[j][0]);
          const yj = Number(ring[j][1]);
          const intersect = ((yi > lat) !== (yj > lat))
            && (lon < ((xj - xi) * (lat - yi)) / ((yj - yi) || 1e-12) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }

      function pointInPolygonSet(lon, lat, polygonSet) {
        if (!Array.isArray(polygonSet)) return false;
        for (const polygon of polygonSet) {
          if (!Array.isArray(polygon) || !Array.isArray(polygon[0])) continue;
          if (pointInRing(lon, lat, polygon)) return true;
        }
        return false;
      }

      function firstValue(values) {
        for (const value of values) {
          if (typeof value === "string" && value.trim()) return value.trim();
          if (value !== null && value !== undefined && typeof value !== "object") return String(value).trim();
        }
        return "";
      }

      function firstUrl(values) {
        function pick(value) {
          if (!value) return "";
          if (typeof value === "string") return value.trim();
          if (typeof value !== "object") return String(value).trim();
          const candidates = [
            value.url, value.hls, value.hlsUrl, value.m3u8, value.m3u8Url, value.m3u8_url,
            value.videoUrl, value.video_url, value.stream_url, value.streamUrl, value.playbackUrl, value.src,
          ];
          for (const candidate of candidates) {
            if (typeof candidate === "string" && candidate.trim()) return candidate.trim();
          }
          return "";
        }

        return values.map(pick).find(Boolean) || "";
      }

      function isLikelyVideo(url) {
        const value = String(url || "").toLowerCase();
        return value.includes(".m3u8") || value.includes("/playlist") || value.includes("/manifest");
      }

      function cameraState(props) {
        const direct = String(props.state || props._state || "").trim().toUpperCase();
        if (/^[A-Z]{2,}$/.test(direct)) {
          return direct;
        }

        const rawId = String(props.cameraId || props.camera_id || props.id || "").trim();
        const prefixMatch = rawId.match(/^([A-Z]{2,}):/i);
        if (prefixMatch) {
          return prefixMatch[1].toUpperCase();
        }

        const source = String(props.source || "").trim().toUpperCase();
        if (source === "CHASERS" || source === "LIVE-CHASERS") return "CHASERS";
        if (source === "HAZCAMS") return "HAZCAMS";
        if (source === "CYCLONEPORT") return "CYCLONEPORT";
        return "";
      }

      function normalizeCamera(feature) {
        const props = feature?.properties ?? {};
        const [lon, lat] = feature?.geometry?.coordinates ?? [];
        if (!Number.isFinite(Number(lon)) || !Number.isFinite(Number(lat))) {
          return null;
        }

        const sourceName = String(firstValue([props.source, props.provider, props.sourceType, ""]) || "").trim().toLowerCase();
        const derivedState = cameraState(props);
        if (sourceName.includes("chaser") || derivedState === "CHASERS") {
          return null;
        }

        const streamUrl = firstUrl([
          props.hls_url, props.streamingURL, props.streamingVideoURL, props.m3u8Url,
          props.m3u8_url, props.m3u8, props.url2, props.URL2, props.hls_stream_protected,
          props.streamSrc, props.httpsVideoUrl, props.httpVideoUrl, props.https_url,
          props.ios_url, props.stream_url, props.video_url, props.videoUrl, props.url,
        ]);

        if (!isLikelyVideo(streamUrl)) {
          return null;
        }

        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [Number(lon), Number(lat)] },
          properties: {
            cameraId: firstValue([props._mapKey, props.cameraId, props.camera_id, props.id, feature.id, streamUrl]),
            name: firstValue([props.cameraName, props.camera_title, props.name, props.title, props.description]) || "Traffic Camera",
            location: firstValue([props.location, props.city, props.county, props.state, props.directionLabel, props.source, "TRAFFIC CAMERA"]),
            source: firstValue([props.source, props.provider, props.sourceType, "traffic-cameras"]),
            state: derivedState,
            stream_url: streamUrl,
          },
        };
      }

      async function loadTrafficCameras() {
        elements.statusText.textContent = "Finding winter warning cameras...";

        async function fetchCameraPayload(url, cacheMode = "force-cache") {
          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), settings.cameraFetchTimeoutMs);
          let response;
          try {
            response = await fetch(url, { cache: cacheMode, signal: controller.signal });
          } finally {
            window.clearTimeout(timeoutId);
          }
          if (!response.ok) {
            throw new Error(`Camera data HTTP ${response.status}`);
          }
          return response.json();
        }

        let data;
        try {
          data = await fetchCameraPayload(settings.cameraDataUrl, "no-store");
        } catch (primaryError) {
          try {
            data = await fetchCameraPayload(settings.fallbackCameraDataUrl, "force-cache");
          } catch {
            throw primaryError;
          }
        }

        const features = Array.isArray(data?.features) ? data.features : [];
        state.cameras = features.map(normalizeCamera).filter(Boolean);
      }

      async function fetchEvents() {
        const response = await fetch("/api/events/relevant", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Events HTTP ${response.status}`);
        }
        const data = await response.json();
        return Array.isArray(data?.features) ? data.features : [];
      }

      async function fetchServerMatches() {
        const url = new URL(settings.matchesUrl, window.location.origin);
        url.searchParams.set("fallbackRadiusMiles", String(settings.fallbackRadiusMiles));
        url.searchParams.set("max", "80");
        if (settings.streamSource !== "*") {
          url.searchParams.set("streamSource", settings.streamSource);
        }
        if (settings.search) {
          url.searchParams.set("search", settings.search);
        }

        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Warned camera matches HTTP ${response.status}`);
        }
        const data = await response.json();
        return Array.isArray(data?.matches)
          ? data.matches.filter((match) => eventIsActiveWarning(match?.event))
          : [];
      }

      
      function isEmbedUrl(url) {
        const value = String(url || "").toLowerCase();
        return value.includes("youtube.com/embed/") || value.includes("youtube.com/live/") || value.includes("youtube.com/watch") || value.includes("youtu.be/") || value.includes("twitch.tv/");
      }

      function showEmbed(url) {
        if (state.hls) {
          state.hls.destroy();
          state.hls = null;
        }
        elements.video.pause();
        elements.video.removeAttribute("src");
        elements.video.load();
        elements.video.style.opacity = "0";
        elements.embedFrame.src = String(url || "").replace(/&amp;/g, "&");
        elements.embedFrame.style.opacity = "1";
      }
      function clearCurrentStream() {
        clearTimeout(state.connectTimeout);
        if (state.hls) {
          state.hls.destroy();
          state.hls = null;
        }
        state.currentStreamUrl = "";
        elements.video.pause();
        elements.video.removeAttribute("src");
        elements.video.load();
        elements.video.style.opacity = "0";
        elements.embedFrame.removeAttribute("src");
        elements.embedFrame.style.opacity = "0";
      }

      function updateOverlay(match, message = "No winter warning cameras available right now") {
        if (!match) {
          clearCurrentStream();
          elements.topPill.classList.add("hidden");
          elements.status.classList.remove("hidden");
          elements.statusText.textContent = message;
          return;
        }

        const theme = match.isChaserCutaway
          ? { label: "LIVE CHASER", primary: "#111827", secondary: "#060910" }
          : classifyAlert(match.event);
        document.documentElement.style.setProperty("--overlay-primary", theme.primary);
        document.documentElement.style.setProperty("--overlay-secondary", theme.secondary);
        elements.warningText.textContent = theme.label;
        elements.locationText.textContent = String(match.stream.properties.name || match.stream.properties.location || "CAMERA").toUpperCase();
        elements.topPill.classList.remove("hidden");
        elements.status.classList.add("hidden");
      }

      function getWarnedCameraMatches(events) {
        const activeWarnings = events
          .filter(eventIsActiveWarning)
          .sort((a, b) => {
            const rankDiff = rankEvent(classifyAlert(a).label) - rankEvent(classifyAlert(b).label);
            if (rankDiff !== 0) return rankDiff;
            return (Date.parse(String(b?.properties?.issued || "")) || 0) - (Date.parse(String(a?.properties?.issued || "")) || 0);
          });

        const preparedWarnings = activeWarnings.map((event) => {
          const polygonSet = getEventPolygonSet(event);
          const bounds = getPolygonBounds(polygonSet);
          const center = bounds
            ? {
                lon: (bounds.minLon + bounds.maxLon) / 2,
                lat: (bounds.minLat + bounds.maxLat) / 2,
              }
            : null;

          return { event, polygonSet, bounds, center };
        });

        const filteredStreams = state.cameras.filter((stream) => {
          if (stream.properties?.is_custom) {
            return false;
          }
          if (settings.streamSource !== "*" && String(stream.properties.source || "").toLowerCase() !== settings.streamSource) {
            return false;
          }
          if (settings.search) {
            const haystack = `${stream.properties.name} ${stream.properties.location} ${stream.properties.source}`.toLowerCase();
            if (!haystack.includes(settings.search.toLowerCase())) {
              return false;
            }
          }
          return true;
        });

        const matches = [];
        for (const stream of filteredStreams) {
          const [lon, lat] = stream.geometry?.coordinates ?? [];
          if (typeof lon !== "number" || typeof lat !== "number") continue;

          for (const warning of preparedWarnings) {
            if (warning.bounds) {
              const margin = 0.08;
              const outsideBounds =
                lon < warning.bounds.minLon - margin ||
                lon > warning.bounds.maxLon + margin ||
                lat < warning.bounds.minLat - margin ||
                lat > warning.bounds.maxLat + margin;

              if (!outsideBounds && pointInPolygonSet(lon, lat, warning.polygonSet)) {
                matches.push({ stream, event: warning.event });
                break;
              }
            } else if (pointInPolygonSet(lon, lat, warning.polygonSet)) {
              matches.push({ stream, event: warning.event });
              break;
            }

            if (warning.center) {
              const distanceMiles = haversineMiles(lat, lon, warning.center.lat, warning.center.lon);
              if (distanceMiles <= settings.fallbackRadiusMiles) {
                matches.push({ stream, event: warning.event });
                break;
              }
            }
          }
        }

        const uniqueMatches = [];
        const seen = new Set();
        for (const match of matches) {
          const key = `${match.stream.properties.cameraId}|${match.event?.properties?.details?.tracking || match.event?.id || match.event?.properties?.event || ""}`;
          if (seen.has(key)) {
            continue;
          }
          seen.add(key);
          uniqueMatches.push(match);
        }

        uniqueMatches.sort((a, b) => {
          const rankDiff = rankEvent(classifyAlert(a.event).label) - rankEvent(classifyAlert(b.event).label);
          if (rankDiff !== 0) return rankDiff;
          return String(a.stream.properties.location || "").localeCompare(String(b.stream.properties.location || ""));
        });

        return uniqueMatches;
      }

      function getCustomChaserMatches(contextEvent) {
        return state.cameras
          .filter((stream) => {
            const properties = stream?.properties || {};
            if (!properties.is_custom) return false;
            if (!properties.stream_url) return false;
            if (settings.streamSource !== "*" && String(properties.source || "").toLowerCase() !== settings.streamSource) return false;
            if (settings.search) {
              const haystack = `${properties.name || ""} ${properties.location || ""} ${properties.source || ""}`.toLowerCase();
              if (!haystack.includes(settings.search.toLowerCase())) return false;
            }
            return true;
          })
          .map((stream) => ({ stream, event: contextEvent || null, isChaserCutaway: true }));
      }
      async function loadStream(match) {
        const url = match?.stream?.properties?.stream_url;
        if (!url) {
          updateOverlay(null);
          return;
        }
        if (state.currentStreamUrl === url) {
          return;
        }

        state.currentStreamUrl = url;
        if (isEmbedUrl(url)) {
          showEmbed(url);
          updateOverlay(match);
          return;
        }
        elements.embedFrame.removeAttribute("src");
        elements.embedFrame.style.opacity = "0";
        elements.video.style.opacity = "0";
        clearTimeout(state.connectTimeout);

        if (state.hls) {
          state.hls.destroy();
          state.hls = null;
        }

        if (typeof Hls === "undefined") {
          state.failedStreamUrls.add(url);
          rotateToNext(true);
          return;
        }

        const hls = new Hls({
          maxBufferLength: 15,
          maxMaxBufferLength: 30,
          liveSyncDurationCount: settings.streamBufferDelay,
          liveMaxLatencyDurationCount: 3,
          backBufferLength: 10,
          lowLatencyMode: false,
        });

        state.hls = hls;
        hls.attachMedia(elements.video);
        hls.loadSource(url);
        state.connectTimeout = setTimeout(() => {
          if (state.currentStreamUrl === url && getComputedStyle(elements.video).opacity === "0") {
            state.failedStreamUrls.add(url);
            rotateToNext(true);
          }
        }, 8000);

        hls.on(Hls.Events.MANIFEST_PARSED, async () => {
          try {
            clearTimeout(state.connectTimeout);
            state.failedStreamUrls.delete(url);
            elements.video.muted = settings.streamMuted;
            await elements.video.play();
            updateOverlay(match);
            elements.video.style.opacity = "1";
          } catch {
            state.failedStreamUrls.add(url);
            rotateToNext(true);
          }
        });

        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (!data?.fatal) {
            return;
          }
          clearTimeout(state.connectTimeout);
          state.failedStreamUrls.add(url);
          rotateToNext(true);
        });
      }

      function rotateToNext(skipFailed = false) {
        const shouldShowChaser = state.chasers.length && (state.rotationStep % 4 === 3 || !state.matches.length);
        state.rotationStep += 1;

        if (shouldShowChaser) {
          const totalChasers = state.chasers.length;
          for (let offset = 1; offset <= totalChasers; offset += 1) {
            const nextIndex = (state.currentChaserIndex + offset + totalChasers) % totalChasers;
            const nextMatch = state.chasers[nextIndex];
            const nextUrl = nextMatch?.stream?.properties?.stream_url;
            if (skipFailed && nextUrl && state.failedStreamUrls.has(nextUrl)) continue;
            state.currentChaserIndex = nextIndex;
            loadStream(nextMatch);
            return;
          }
        }

        if (!state.matches.length) {
          state.currentIndex = -1;
          updateOverlay(null, "No winter warning cameras available right now");
          return;
        }

        const total = state.matches.length;
        for (let offset = 1; offset <= total; offset += 1) {
          const nextIndex = (state.currentIndex + offset + total) % total;
          const nextMatch = state.matches[nextIndex];
          const nextUrl = nextMatch?.stream?.properties?.stream_url;
          if (skipFailed && nextUrl && state.failedStreamUrls.has(nextUrl)) continue;
          state.currentIndex = nextIndex;
          loadStream(nextMatch);
          return;
        }

        state.currentIndex = -1;
        updateOverlay(null, "No winter warning cameras available right now");
      }

      async function syncMatches() {
        try {
          let matches;
          try {
            matches = await fetchServerMatches();
          } catch (serverMatchError) {
            if (!state.cameras.length) {
              await loadTrafficCameras();
            }
            const events = await fetchEvents();
            matches = getWarnedCameraMatches(events);
            console.warn("[WarnedCams] Server match endpoint failed, using local fallback", serverMatchError);
          }

          if (!state.cameras.length) {
            await loadTrafficCameras();
          }

          let contextEvent = matches[0]?.event || null;
          if (!contextEvent) {
            const events = await fetchEvents();
            contextEvent = events[0] || null;
          }
          const chasers = getCustomChaserMatches(contextEvent);
          const nextSignature = [
            ...matches.map((match) => `${match?.stream?.properties?.cameraId || match?.stream?.properties?.stream_url || ""}|${match?.event?.properties?.details?.tracking || match?.event?.id || ""}|${match?.event?.properties?.issued || ""}|${match?.event?.properties?.expires || ""}`),
            ...chasers.map((match) => `chaser|${match?.stream?.properties?.cameraId || match?.stream?.properties?.stream_url || ""}`),
          ].join("||");
          if (nextSignature === state.currentEventsSignature && (state.matches.length || state.chasers.length)) {
            return;
          }

          state.currentEventsSignature = nextSignature;
          const previousUrl = state.matches[state.currentIndex]?.stream?.properties?.stream_url || state.chasers[state.currentChaserIndex]?.stream?.properties?.stream_url || "";
          state.matches = matches;
          state.chasers = chasers;

          const activeUrls = new Set([...state.matches, ...state.chasers].map((match) => match?.stream?.properties?.stream_url).filter(Boolean));
          state.failedStreamUrls.forEach((url) => {
            if (!activeUrls.has(url)) {
              state.failedStreamUrls.delete(url);
            }
          });

          if (!state.matches.length && !state.chasers.length) {
            state.currentIndex = -1;
            state.currentChaserIndex = -1;
            updateOverlay(null, "No winter warning cameras available right now");
            return;
          }

          const matchingIndex = state.matches.findIndex((match) => match.stream.properties.stream_url === previousUrl);
          state.currentIndex = matchingIndex >= 0 ? matchingIndex : -1;
          if (state.currentIndex === -1) {
            rotateToNext(true);
          } else {
            loadStream(state.matches[state.currentIndex]);
          }
        } catch (error) {
          updateOverlay(null, error instanceof Error ? error.message : "Warned cameras failed to load");
        }
      }

      function startRotationLoop() {
        if (state.rotationTimer) {
          clearInterval(state.rotationTimer);
        }
        state.rotationTimer = setInterval(() => {
          if (state.matches.length || state.chasers.length) {
            rotateToNext(true);
          }
        }, settings.rotationTime * 1000);
      }

      syncMatches();
      startRotationLoop();
      state.refreshTimer = setInterval(syncMatches, settings.refreshTime * 1000);
    });
  </script>
</body>
</html>
